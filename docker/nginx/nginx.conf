# ══════════════════════════════════════════════════════════════
# TanIA Frontend — Nginx Configuration
# Sirve el build de React y hace proxy a las APIs
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Archivos estáticos (JS, CSS, imágenes, videos, modelos) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /videos/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location /models/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Proxy a API de IdeaInMotion (Gestor Documental) ──
    location /api/ideainmotion/ {
        proxy_pass https://totem.ideainmotion.cl/;
        proxy_set_header Host totem.ideainmotion.cl;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # ── Proxy al Backend PHP (Tickets + Emails) ──
    # En Docker, el backend corre en el servicio "backend" (docker-compose)
    location /api/tickets/ {
        proxy_pass http://backend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── SPA Fallback: todas las rutas van a index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Seguridad básica ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Gzip para performance ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
