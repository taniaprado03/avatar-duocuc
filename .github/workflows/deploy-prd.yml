# ══════════════════════════════════════════════════════════════
# TanIA — CI/CD: Deploy a PRD (Producción)
# Se ejecuta cuando hay push o merge a la rama "main"
# Vercel hace el deploy del frontend automáticamente
# ══════════════════════════════════════════════════════════════

name: 🚀 Deploy a PRD

on:
  push:
    branches:
      - main

jobs:
  # ── JOB 1: Validar build antes de ir a producción ──
  build-prd:
    name: 🔨 Build PRD
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🔨 Build de producción
        run: npm run build
        env:
          VITE_CLAUDE_API_KEY: ${{ secrets.VITE_CLAUDE_API_KEY_PRD }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL_PRD }}
          VITE_SEDE: "San Bernardo"
          VITE_SEDE_CODE: "SB"

  # ── JOB 2: Verificar deploy en Vercel ──
  verify-vercel:
    name: 🌐 Verificar PRD en Vercel
    runs-on: ubuntu-latest
    needs: build-prd

    steps:
      - name: ⏳ Esperar deploy de Vercel
        run: |
          echo "============================================"
          echo "🚀 TanIA PRD Deploy iniciado"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"
          echo "============================================"
          echo ""
          echo "📌 Vercel detecta automáticamente el push a 'main'"
          echo "   y hace el deploy del frontend."
          echo ""
          echo "🔗 URL PRD: https://avatar-duocuc.vercel.app"
          echo ""
          echo "⚠️  RECORDAR: El backend PHP en servidor Docker"
          echo "   debe actualizarse manualmente o via SSH."

      - name: ✅ Deploy completado
        run: |
          echo "============================================"
          echo "✅ Pipeline PRD completado exitosamente"
          echo "============================================"
